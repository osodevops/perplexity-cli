name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*
  workflow_dispatch:
    inputs:
      tag-name:
        description: "Tag to release (e.g. v0.3.5)"
        required: true

env:
  TAG_NAME: ${{ inputs.tag-name || github.ref_name }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${TAG_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file for gh release create
          echo "$BODY" > release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release_notes.md

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../pplx-${{ matrix.target }}.tar.gz pplx
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pplx-${{ matrix.target }}.zip pplx.exe
          cd ../../..

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG_NAME" pplx-${{ matrix.target }}.* --clobber

  homebrew:
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          BASE_URL="https://github.com/osodevops/perplexity-cli/releases/download/${TAG_NAME}"

          # Download each binary tarball and compute SHA256
          curl -fsSL "${BASE_URL}/pplx-aarch64-apple-darwin.tar.gz" -o arm64.tar.gz
          curl -fsSL "${BASE_URL}/pplx-x86_64-apple-darwin.tar.gz" -o x86_64_mac.tar.gz
          curl -fsSL "${BASE_URL}/pplx-x86_64-unknown-linux-gnu.tar.gz" -o x86_64_linux.tar.gz

          SHA_ARM64=$(sha256sum arm64.tar.gz | awk '{print $1}')
          SHA_X86_64_MAC=$(sha256sum x86_64_mac.tar.gz | awk '{print $1}')
          SHA_X86_64_LINUX=$(sha256sum x86_64_linux.tar.gz | awk '{print $1}')

          # Generate the formula
          cat > pplx.rb <<FORMULA
          class Pplx < Formula
            desc "A fast Perplexity API CLI built in Rust"
            homepage "https://github.com/osodevops/perplexity-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/pplx-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "${BASE_URL}/pplx-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MAC}"
              end
            end

            on_linux do
              url "${BASE_URL}/pplx-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_X86_64_LINUX}"
            end

            def install
              bin.install "pplx"
            end

            test do
              assert_match "pplx #{version}", shell_output("#{bin}/pplx --version")
            end
          end
          FORMULA

          # Remove heredoc indentation
          sed -i 's/^          //' pplx.rb

          # Push to homebrew-tap
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/osodevops/homebrew-tap.git" tap
          cp pplx.rb tap/Formula/pplx.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pplx.rb
          git commit -m "pplx ${VERSION}"
          git push
