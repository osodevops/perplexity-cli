name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pplx
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/osodevops/perplexity-cli/releases/download/${GITHUB_REF_NAME}"

          # Download each binary tarball and compute SHA256
          curl -fsSL "${BASE_URL}/pplx-aarch64-apple-darwin.tar.gz" -o arm64.tar.gz
          curl -fsSL "${BASE_URL}/pplx-x86_64-apple-darwin.tar.gz" -o x86_64_mac.tar.gz
          curl -fsSL "${BASE_URL}/pplx-x86_64-unknown-linux-gnu.tar.gz" -o x86_64_linux.tar.gz

          SHA_ARM64=$(sha256sum arm64.tar.gz | awk '{print $1}')
          SHA_X86_64_MAC=$(sha256sum x86_64_mac.tar.gz | awk '{print $1}')
          SHA_X86_64_LINUX=$(sha256sum x86_64_linux.tar.gz | awk '{print $1}')

          # Generate the formula
          cat > pplx.rb <<FORMULA
          class Pplx < Formula
            desc "A fast Perplexity API CLI built in Rust"
            homepage "https://github.com/osodevops/perplexity-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/pplx-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "${BASE_URL}/pplx-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MAC}"
              end
            end

            on_linux do
              url "${BASE_URL}/pplx-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_X86_64_LINUX}"
            end

            def install
              bin.install "pplx"
            end

            test do
              assert_match "pplx #{version}", shell_output("#{bin}/pplx --version")
            end
          end
          FORMULA

          # Remove heredoc indentation
          sed -i 's/^          //' pplx.rb

          # Push to homebrew-tap
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/osodevops/homebrew-tap.git" tap
          cp pplx.rb tap/Formula/pplx.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pplx.rb
          git commit -m "pplx ${VERSION}"
          git push
